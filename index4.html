<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>gabut jir jadi bikin beginian</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
            background: radial-gradient(ellipse at bottom, #1b2735 0%, #090a0f 100%);
        }

        /* ========== BINTANG-BINTANG ========== */
        .stars {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 0;
        }
        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle var(--dur) ease-in-out infinite;
            animation-delay: var(--delay);
        }
        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.8); box-shadow: 0 0 10px 3px white; }
        }

        /* ========== SHOOTING STAR ========== */
        .shooting-star {
            position: fixed;
            width: 3px;
            height: 80px;
            background: linear-gradient(to bottom, rgba(255,255,255,0), rgba(255,255,255,1));
            border-radius: 50%;
            animation: shoot var(--sdur) linear infinite;
            animation-delay: var(--sdelay);
            opacity: 0;
            z-index: 1;
        }
        @keyframes shoot {
            0% { transform: translate(0, 0) rotate(-30deg); opacity: 0; }
            5% { opacity: 1; }
            15% { transform: translate(-300px, 400px) rotate(-30deg); opacity: 0; }
            100% { transform: translate(-300px, 400px) rotate(-30deg); opacity: 0; }
        }

        /* ========== KONTAINER UTAMA ========== */
        .container {
            text-align: center;
            animation: fadeIn 1s ease;
            z-index: 10;
            padding: 20px;
            position: relative;
        }

        .gift-box {
            font-size: 120px;
            animation: bounce 1s infinite;
            cursor: pointer;
            filter: drop-shadow(0 0 30px rgba(255, 215, 0, 0.8));
            transition: transform 0.3s;
        }
        .gift-box:hover { transform: scale(1.15); }

        .message { color: white; margin-top: 20px; text-shadow: 0 0 20px rgba(255,255,255,0.5); }
        .message h1 { font-size: 1.8em; }
        .message p { font-size: 1.1em; margin-top: 10px; opacity: 0.9; }

        .hidden-message {
            display: none;
            animation: popIn 0.6s cubic-bezier(0.68, -0.55, 0.27, 1.55);
        }

        /* ========== VIDEO CONTAINER ========== */
        .video-container {
            width: 300px;
            height: 300px;
            margin: 0 auto 20px;
            border-radius: 20px;
            overflow: hidden;
            border: 5px solid rgba(255,255,255,0.8);
            box-shadow: 0 0 50px rgba(255, 255, 255, 0.3), 0 0 100px rgba(138, 43, 226, 0.4);
            background: black;
            animation: spotlight 4s ease-in-out infinite, floatVideo 5s ease-in-out infinite;
        }

        @keyframes spotlight {
            0%, 100% { box-shadow: 0 0 50px rgba(255, 255, 255, 0.3), 0 0 100px rgba(138, 43, 226, 0.4); }
            25% { box-shadow: 0 0 80px rgba(255, 255, 255, 0.6), 0 0 150px rgba(0, 255, 255, 0.6); }
            50% { box-shadow: 0 0 50px rgba(255, 255, 255, 0.3), 0 0 100px rgba(255, 105, 180, 0.6); }
            75% { box-shadow: 0 0 90px rgba(255, 255, 255, 0.7), 0 0 160px rgba(138, 43, 226, 0.7); }
        }

        @keyframes floatVideo {
            0%, 100% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(15px, -10px) scale(1.05); }
            50% { transform: translate(-10px, 10px) scale(0.95); }
            75% { transform: translate(-15px, -5px) scale(1.03); }
        }

        .video-container video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 15px;
        }

        /* ========== PARTIKEL MENGELILINGI VIDEO ========== */
        .orbit-particle {
            position: fixed;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: white;
            box-shadow: 0 0 10px 3px rgba(255,255,255,0.8);
            animation: orbit 3s linear infinite;
            pointer-events: none;
            z-index: 5;
        }
        @keyframes orbit {
            0% { transform: rotate(0deg) translateX(170px) rotate(0deg); opacity: 1; }
            100% { transform: rotate(360deg) translateX(170px) rotate(-360deg); opacity: 0.3; }
        }

        .hidden-message h1 {
            color: white;
            font-size: 2.5em;
            text-shadow: 0 0 30px rgba(255,255,255,0.8), 0 0 60px rgba(138, 43, 226, 0.6);
            margin-bottom: 10px;
            animation: glowText 2s ease-in-out infinite;
        }
        @keyframes glowText {
            0%, 100% { text-shadow: 0 0 30px rgba(255,255,255,0.8), 0 0 60px rgba(138, 43, 226, 0.6); }
            50% { text-shadow: 0 0 50px rgba(255,255,255,1), 0 0 90px rgba(0, 255, 255, 0.8); }
        }

        .hidden-message p {
            color: #e0d5ff;
            font-size: 1.2em;
            margin: 12px 0;
            line-height: 1.6;
            text-shadow: 0 0 10px rgba(255,255,255,0.4);
        }

        .emot-besar {
            font-size: 2em;
            animation: bounceEmot 0.8s infinite;
            display: inline-block;
            filter: drop-shadow(0 0 10px rgba(255,255,255,0.6));
        }
        @keyframes bounceEmot {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        .btn {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: 2px solid rgba(255,255,255,0.3);
            padding: 14px 38px;
            font-size: 1.1em;
            border-radius: 50px;
            cursor: pointer;
            margin-top: 15px;
            font-weight: bold;
            box-shadow: 0 0 30px rgba(138, 43, 226, 0.5);
            transition: all 0.3s;
            text-shadow: 0 0 10px rgba(255,255,255,0.5);
        }
        .btn:hover {
            transform: scale(1.1);
            box-shadow: 0 0 50px rgba(138, 43, 226, 0.8);
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-25px); }
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes popIn {
            from { transform: scale(0) rotate(-10deg); opacity: 0; }
            to { transform: scale(1) rotate(0deg); opacity: 1; }
        }

        @media (max-width: 600px) {
            .gift-box { font-size: 80px; }
            .message h1 { font-size: 1.3em; }
            .video-container { width: 240px; height: 240px; }
            .hidden-message h1 { font-size: 1.8em; }
            @keyframes orbit {
                0% { transform: rotate(0deg) translateX(130px) rotate(0deg); opacity: 1; }
                100% { transform: rotate(360deg) translateX(130px) rotate(-360deg); opacity: 0.3; }
            }
        }
    </style>
</head>
<body>

    <!-- BINTANG BACKGROUND -->
    <div class="stars" id="starsContainer"></div>

    <!-- SHOOTING STARS -->
    <div id="shootingStars"></div>

    <!-- AUDIO -->
    <audio id="kicauAudio" loop>
        <source src="https://github.com/ridwansyah4379-commits/Audio-kicau-mania/raw/refs/heads/main/videoplayback%20(1).m4a" type="audio/mp4">
    </audio>

    <!-- PARTIKEL ORBIT -->
    <div id="orbitParticles"></div>

    <div class="container">
        <div id="initialView">
            <div class="gift-box" onclick="bukaHadiah()">🎁</div>
            <div class="message">
                <h1>gabut jir jadi bikin beginian 😂</h1>
                <p>pencet aja dulu kalo penasaran 👆</p>
            </div>
        </div>

        <div class="hidden-message" id="revealView">
            <div class="video-container" id="videoBox">
                <video autoplay loop muted playsinline>
                    <source src="https://github.com/ridwansyah4379-commits/Video-kucing/raw/refs/heads/main/kicau%20mania%20kucing%20%23kicau%20%23kicaumania%20%23memecing%20%23scuba%20%23upinipin%20%23kucing%20%23fyp.mp4" type="video/mp4">
                </video>
            </div>

            <h1>MEONG! 🐱</h1>
            <p>
                aku mulai kecanduan kicau mania jir 🤗 <br>
                kucingnya <b>ngeselin</b> tapi <b>nagih</b> 😭<br>
                liat terus gak bosen-bosen 🕺🐱 <br><br>
                <span class="emot-besar">🐱💢😜😻</span> <br><br>
                intinya: <b>kicau mania + kucing = kecandu</b> dah 🐈
            </p>
            <button class="btn" onclick="ulangi()">🔄 Pencet Lagi Deh</button>
        </div>
    </div>

    <script>
        // ========== BIKIN BINTANG ==========
        function buatBintang() {
            const container = document.getElementById('starsContainer');
            for (let i = 0; i < 200; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                const size = Math.random() * 3 + 1;
                star.style.width = size + 'px';
                star.style.height = size + 'px';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.setProperty('--dur', (Math.random() * 3 + 2) + 's');
                star.style.setProperty('--delay', Math.random() * 5 + 's');
                container.appendChild(star);
            }
        }

        // ========== SHOOTING STARS ==========
        function buatShootingStars() {
            const container = document.getElementById('shootingStars');
            for (let i = 0; i < 3; i++) {
                const shoot = document.createElement('div');
                shoot.className = 'shooting-star';
                shoot.style.top = Math.random() * 40 + '%';
                shoot.style.left = Math.random() * 80 + '%';
                shoot.style.setProperty('--sdur', (Math.random() * 4 + 4) + 's');
                shoot.style.setProperty('--sdelay', (Math.random() * 8) + 's');
                container.appendChild(shoot);
            }
        }

        // ========== PARTIKEL ORBIT ==========
        function buatOrbitParticles() {
            const container = document.getElementById('orbitParticles');
            const warna = ['#ff6b6b', '#ffd93d', '#6bcb77', '#4d96ff', '#ff922b', '#ff6eb4', '#fff', '#a855f7'];
            for (let i = 0; i < 8; i++) {
                const particle = document.createElement('div');
                particle.className = 'orbit-particle';
                particle.style.backgroundColor = warna[i];
                particle.style.boxShadow = `0 0 10px 3px ${warna[i]}`;
                particle.style.animationDelay = (i * 0.4) + 's';
                container.appendChild(particle);
            }
        }

        // ========== POSISI PARTIKEL MENGIKUTI VIDEO ==========
        function updateOrbitPosition() {
            const videoBox = document.getElementById('videoBox');
            if (!videoBox || videoBox.style.display === 'none') return;
            
            const rect = videoBox.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;
            
            const particles = document.querySelectorAll('.orbit-particle');
            particles.forEach(p => {
                p.style.left = centerX + 'px';
                p.style.top = centerY + 'px';
            });
        }

        // Update posisi partikel saat scroll/resize
        setInterval(updateOrbitPosition, 50);
        window.addEventListener('resize', updateOrbitPosition);
        window.addEventListener('scroll', updateOrbitPosition);

        // ========== BUKA HADIAH ==========
        function bukaHadiah() {
            const audio = document.getElementById('kicauAudio');
            audio.play().catch(() => {});

            document.getElementById('initialView').style.display = 'none';
            document.getElementById('revealView').style.display = 'block';
            document.title = '🐱 KICAU DULU BOSS! 🐱';

            const video = document.querySelector('.video-container video');
            if (video) {
                video.play().catch(() => {});
            }

            // Tampilkan partikel orbit
            document.getElementById('orbitParticles').style.display = 'block';
            setTimeout(updateOrbitPosition, 100);
        }

        function ulangi() {
            const video = document.querySelector('.video-container video');
            if (video) {
                video.pause();
                video.currentTime = 0;
            }

            document.getElementById('initialView').style.display = 'block';
            document.getElementById('revealView').style.display = 'none';
            document.title = 'gabut jir jadi bikin beginian';
            document.getElementById('orbitParticles').style.display = 'none';
        }

        // ========== INIT ==========
        buatBintang();
        buatShootingStars();
        buatOrbitParticles();
        document.getElementById('orbitParticles').style.display = 'none';
    </script>
</body>
</html>
