<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>gabut jir jadi bikin beginian</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: linear-gradient(135deg, #ffd89b, #19547b);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', sans-serif;
            overflow-x: hidden;
        }

        .container {
            text-align: center;
            animation: fadeIn 1s ease;
            z-index: 10;
            padding: 20px;
        }

        .gift-box {
            font-size: 120px;
            animation: bounce 1s infinite;
            cursor: pointer;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.3));
            transition: transform 0.3s;
        }
        .gift-box:hover { transform: scale(1.15); }

        .message { color: white; margin-top: 20px; text-shadow: 2px 2px 10px rgba(0,0,0,0.3); }
        .message h1 { font-size: 1.8em; }
        .message p { font-size: 1.1em; margin-top: 10px; opacity: 0.9; }

        .hidden-message {
            display: none;
            animation: popIn 0.6s cubic-bezier(0.68, -0.55, 0.27, 1.55);
        }

        .video-container {
            width: 260px;
            height: 260px;
            margin: 0 auto 15px;
            border-radius: 20px;
            overflow: hidden;
            border: 5px solid white;
            box-shadow: 0 15px 40px rgba(0,0,0,0.3);
            background: black;
            animation: floatCat 3s ease-in-out infinite;
        }

        .video-container video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 15px;
        }

        @keyframes floatCat {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            25% { transform: translateY(-10px) rotate(-2deg); }
            75% { transform: translateY(-10px) rotate(2deg); }
        }

        .hidden-message h1 {
            color: white;
            font-size: 2.2em;
            text-shadow: 2px 2px 15px rgba(0,0,0,0.4);
            margin-bottom: 8px;
        }

        .hidden-message p {
            color: #fff5f5;
            font-size: 1.2em;
            margin: 12px 0;
            line-height: 1.6;
        }

        .emot-besar {
            font-size: 2em;
            animation: bounceEmot 0.8s infinite;
            display: inline-block;
        }
        @keyframes bounceEmot {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        .btn {
            background: white;
            color: #19547b;
            border: none;
            padding: 14px 38px;
            font-size: 1.1em;
            border-radius: 50px;
            cursor: pointer;
            margin-top: 15px;
            font-weight: bold;
            box-shadow: 0 8px 25px rgba(0,0,0,0.2);
            transition: transform 0.3s;
        }
        .btn:hover { transform: scale(1.1); }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-25px); }
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes popIn {
            from { transform: scale(0) rotate(-10deg); opacity: 0; }
            to { transform: scale(1) rotate(0deg); opacity: 1; }
        }

        @media (max-width: 600px) {
            .gift-box { font-size: 80px; }
            .message h1 { font-size: 1.3em; }
            .video-container { width: 200px; height: 200px; }
            .hidden-message h1 { font-size: 1.6em; }
        }
    </style>
</head>
<body>

    <audio id="kicauAudio" loop>
        <source src="https://github.com/ridwansyah4379-commits/Audio-kicau-mania/raw/refs/heads/main/videoplayback%20(1).m4a" type="audio/mp4">
    </audio>

    <div class="container">
        <div id="initialView">
            <div class="gift-box" onclick="bukaHadiah()">🎁</div>
            <div class="message">
                <h1>gabut jir jadi bikin beginian 😂</h1>
                <p>pencet aja dulu kalo penasaran 👆</p>
            </div>
        </div>

        <div class="hidden-message" id="revealView">
            <div class="video-container">
                <video autoplay loop muted playsinline>
                    <source src="https://github.com/ridwansyah4379-commits/Video-kucing/raw/refs/heads/main/kicau%20mania%20kucing%20%23kicau%20%23kicaumania%20%23memecing%20%23scuba%20%23upinipin%20%23kucing%20%23fyp.mp4" type="video/mp4">
                </video>
            </div>

            <h1>MEONG! 🐱</h1>
            <p>
                aku mulai kecanduan kicau mania jir 🤗 <br>
                kucingnya <b>ngeselin</b> tapi <b>nagih</b> 😭💕 <br>
                liat terus gak bosen-bosen 🕺🐱 <br><br>
                <span class="emot-besar">🐱💢😻🐱💢😻</span> <br><br>
                intinya: <b>kicau mania + kucing joget = candu</b> dah 🐈
            </p>
            <button class="btn" onclick="ulangi()">🔄 Pencet Lagi Deh</button>
        </div>
    </div>

    <script>
        function bukaHadiah() {
            const audio = document.getElementById('kicauAudio');
            audio.play().catch(() => {});

            document.getElementById('initialView').style.display = 'none';
            document.getElementById('revealView').style.display = 'block';
            document.title = '🐱 KICAU DULU GAS! 🐱';

            const video = document.querySelector('.video-container video');
            if (video) {
                video.play().catch(() => {});
            }
        }

        function ulangi() {
            const video = document.querySelector('.video-container video');
            if (video) {
                video.pause();
                video.currentTime = 0;
            }

            document.getElementById('initialView').style.display = 'block';
            document.getElementById('revealView').style.display = 'none';
            document.title = 'gabut jir jadi bikin beginian';
        }
    </script>
</body>
</html>
